name: Monthly Update

on:
  schedule:
    # 1st of each month at 08:00 UTC (10:00 NL during DST, 09:00 NL in winter)
    - cron: '0 8 1 * *'
  workflow_dispatch:  # allow manual triggering from the Actions tab

permissions:
  contents: write   # required so the workflow can commit and push

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect tenure + macro data
        run: python scripts/collect_data.py

      - name: Classify leaders (Claude API + web search)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/classify.py

      - name: Copy latest.json to docs for Pages
        run: |
          mkdir -p docs/data
          cp data/latest.json docs/data/latest.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            ISO_WEEK=$(date +'%Y-W%V')
            git commit -m "Monthly update — $ISO_WEEK"
            git push
          fi
